# trans-novel 配置（多语言小说 → 中文）
# 改这里就能调整行为，不用动代码：模型 ID、档位、流水线开关都在这。

language:
  # 来源语言：auto 让模型自动识别；也可写死语言代码，如 ja / en / ko / ru / de
  source: auto
  # 译文语言
  target: zh

# ── LLM：DeepSeek 三档（通过 OpenAI SDK 调用 https://api.deepseek.com）─────
# strong / cheap 开思考（要动脑的判断类任务）；fast 关思考（机械任务，思考会多花
# 推理 token 且按输出计费，关掉能明显省钱提速）。某档没配时按 fast→cheap→strong 找替补。
llm:
  # 模型来源：deepseek 正常联网；fake 用于离线测试，不发任何网络请求
  provider: deepseek
  base_url: https://api.deepseek.com
  # 从这个环境变量读取 API key
  api_key_env: DEEPSEEK_API_KEY
  # 单次请求超时（秒）；开思考时耗时较长，别设太小
  timeout: 600
  # 请求失败后的重试次数（间隔逐次拉长）
  max_retries: 4
  tiers:
    strong:
      # 翻译 / 润色 / 全局分析 / 起标题
      model: deepseek-v4-pro
      reasoning_effort: high
      thinking: true
    cheap:
      # 审校 / 一致性检查 / 回译比对（都是判断类，保留思考）
      model: deepseek-v4-flash
      reasoning_effort: high
      thinking: true
    fast:
      # 梗概 / 全书概览 / 术语抽取 / 回译（机械任务，不开思考）
      model: deepseek-v4-flash
      thinking: false

# ── 切分 ─────────────────────────────────────────────────────────────────
segment:
  # 每个翻译批次的目标大小（按字符数粗估 token）
  max_chars_per_batch: 1800
  # 单段超过这个长度就在句末标点处再切开，翻译后仍合并回原段，避免出现超长段落
  max_chars_per_segment: 1200

# ── 流水线开关（在质量和成本之间取舍）──────────────────────────────────
pipeline:
  # 每章译完后整章审校（用 cheap 档）：查漏译、误译、术语、人称
  review: true
  # 审校发现严重问题（漏译 / 误译）后自动重译；审校只盯专名和真正的语义错误，误报少
  autofix_severe: true
  # 译文与原文对不齐时的重试上限
  align_retry_limit: 2
  # 润色（用 strong 档）：相当于用 pro 把全书再翻一遍，最费钱，默认关
  polish: true
  # 回译抽检的比例（0 表示关闭）
  backtranslate_sample: 0
  # 全书翻完后再做一次跨章一致性检查
  consistency_qa: false
  # 注入给译者参考的前文译文段落数（保持上下文连贯）
  rolling_context_segments: 6
  # 翻译前先通读原文，生成全书概览和每章梗概注入翻译，让译者对整本书心里有数；
  # 全书概览是固定前缀，能命中缓存反复复用。关掉可省去这次预扫的成本
  book_understanding: true
  # 预扫每章梗概时的并发线程数（各章互不影响，1 为串行）
  prescan_concurrency: 4
  # 术语注入范围：chapter 只注入本章出现的词条加锁定的人物名（长书省 token）；full 注入整张术语表
  glossary_scope: chapter
  # 附属章（前言 / 注释 / 索引 / 参考文献 / 致谢等，按标题关键词和全书首尾位置识别）的处理档位：
  # skip 原文直接输出、不花钱；light 用 fast 档粗翻，跳过审校 / 润色 / 回译（省成本）；full 走完整流水线。
  # 任何档位都不从附属章抽术语（里面的人名书名会污染全书术语表）。填错值启动即报错。
  back_matter: light
  # 是否在翻译过程中从已译内容里回收术语：false（默认）只用翻译前一次性定名的结果，
  # 翻译期术语表只读，避免把初稿的直译固化成全书标准、也避免制造假冲突；
  # true 恢复旧行为（边译边抽 + 章末抽取），日文轻小说称呼变体、口癖多时建议开
  inflight_glossary: false
  # 去翻译腔：只看中文译文来审读并改写，改动要过三道关卡才采纳；
  # 已译章节不会自动补做，老书想补跑用 `tools naturalize`
  naturalize: true

# ── 敬称策略（源文为日语时生效，其它语言一般用不到）────────────────────
honorific:
  # keep_style 体现语气（前辈 / 小X / X君…）；normalize 按统一规则处理；drop 直接省略
  strategy: keep_style

# ── 标点规范化（统一成简体中文大陆常用的全角标点）───────────────────────
punctuation:
  normalize: true

# ── 路径 ─────────────────────────────────────────────────────────────────
paths:
  # 运行状态、各章中间产物、术语库的存放目录
  state_dir: state

# ── 双语输出 ───────────────────────────────────────────────────────────────
output:
  # 输出纯中文版
  mono: true
  # 输出双语对照版（原文淡化显示）
  bilingual: true
  # 双语顺序：target_first 译文在上原文在下；source_first 原文在上
  bilingual_order: target_first
