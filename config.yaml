# trans-novel 配置（日译中）
# 修改后无需改代码；模型 ID、档位、流水线开关都在这里。

language:
  source: auto         # auto 自动检测来源语言（主攻 日/英）；也可写死 ja / en
  target: zh           # 译文语言

# ── LLM：DeepSeek 双档（经 OpenAI SDK 调 https://api.deepseek.com）─────────
# 两档都开 thinking 模式、reasoning_effort 都用 high（示例只有 high）；
# 成本差异只靠模型区分：强档 pro 求质量，廉价档 flash 控成本。
llm:
  provider: deepseek            # deepseek | fake（fake 用于离线测试，不发网络请求）
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY # 从该环境变量读取 key
  timeout: 600                  # 单次请求超时（秒），思考模式耗时较长
  max_retries: 4                # 失败重试次数（指数退避）
  tiers:
    strong:
      model: deepseek-v4-pro    # 翻译 / 润色 / 全局分析
      reasoning_effort: high
      thinking: true
    cheap:
      model: deepseek-v4-flash  # 术语抽取 / 审校 / 一致性 QA / 回译抽检
      reasoning_effort: high
      thinking: true

# ── 切分 ─────────────────────────────────────────────────────────────────
segment:
  # 一个翻译批次（句群）的目标大小，按字符估算 token（日文≈1字符1token）。
  max_chars_per_batch: 1800
  # 单个段落超过该长度时按句末标点再切成多段（续段回填时并回同段），避免超长段。
  max_chars_per_segment: 1200

# ── 流水线开关（质量/成本平衡）───────────────────────────────────────────
pipeline:
  review: true              # 审校（廉价档）：漏译/误译/术语/人称检查——只上报问题供人工介入
  align_retry_limit: 2      # 批次翻译段数不符时的整批重试次数，超限后逐段兜底
  polish: false             # 润色（强档）：已默认关闭——它等于用 pro 把全书再翻一遍，最烧钱；需要时手动开
  backtranslate_sample: 0.05  # 回译抽检比例（0 关闭）
  consistency_qa: true      # 全书跨章一致性收尾扫描
  rolling_context_segments: 6 # 注入的前文译文尾段数
  book_understanding: true  # 翻译前预扫源文，生成全书概览+逐章梗概注入翻译（让译者对全书有理解）；
                            # 廉价档，全书概览为恒定前缀可命中缓存复用；关掉省去预扫成本

# ── 敬称策略（日语源专用，英语源忽略）────────────────────────────────────
honorific:
  # keep_style: 体现语气（前辈/小X/X君…）; normalize: 按统一规则；drop: 省略
  strategy: keep_style

# ── 标点规范化（统一为简体中文大陆通用全角标点）────────────────────────────
punctuation:
  normalize: true

# ── 术语 AI 审计统一（收尾自动消除译法漂移，并改写正文）────────────────────
glossary_audit: true

# ── 路径 ─────────────────────────────────────────────────────────────────
paths:
  state_dir: state          # 运行状态、各章中间产物、术语库
